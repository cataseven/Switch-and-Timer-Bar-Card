name: Issue and Release Automation
on:
  release:
    types: [published]
jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: switch-and-timer-bar-card.js
          fail_on_unmatched_files: true
